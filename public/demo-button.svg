<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <style>
      @keyframes gradShift {
        0%   { stop-color: #6366f1; }
        33%  { stop-color: #8b5cf6; }
        66%  { stop-color: #a855f7; }
        100% { stop-color: #6366f1; }
      }
      @keyframes gradShift2 {
        0%   { stop-color: #ec4899; }
        33%  { stop-color: #f43f5e; }
        66%  { stop-color: #8b5cf6; }
        100% { stop-color: #ec4899; }
      }
      @keyframes outerPulse {
        0%, 100% { opacity: 0.45; transform: scale(1.04) translate(-6px, -2px); }
        50%       { opacity: 0.8;  transform: scale(1.08) translate(-8px, -3px); }
      }
      @keyframes shimmer {
        0%   { transform: translateX(-320px); }
        100% { transform: translateX(640px);  }
      }
      @keyframes rocketBounce {
        0%, 100% { transform: translateY(0px);  }
        50%       { transform: translateY(-3px); }
      }
      .s1  { animation: gradShift  4s ease infinite; }
      .s2  { animation: gradShift2 4s ease infinite; }
      .glow-pulse { animation: outerPulse 2.5s ease-in-out infinite; }
      .shimmer    { animation: shimmer 2.8s ease-in-out infinite; }
      .rocket     { animation: rocketBounce 1.6s ease-in-out infinite; }
    </style>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   class="s1" stop-color="#6366f1"/>
      <stop offset="100%" class="s2" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="shimmerG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-80%" width="150%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="320" height="72" rx="36"/></clipPath>
  </defs>

  <!-- Outer pulsing glow blob -->
  <rect class="glow-pulse" width="320" height="72" rx="36"
        fill="url(#g1)" opacity="0.45"
        transform="scale(1.04) translate(-6,-2)"/>

  <!-- Button body -->
  <rect width="320" height="72" rx="36" fill="url(#g1)"/>

  <!-- Shimmer sweep -->
  <g clip-path="url(#clip)">
    <rect class="shimmer" x="0" y="0" width="160" height="72" fill="url(#shimmerG)"/>
  </g>

  <!-- Inner highlight border -->
  <rect width="318" height="70" x="1" y="1" rx="35"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Rocket icon (animated separately) -->
  <text class="rocket" x="72" y="42"
        text-anchor="middle" dominant-baseline="middle"
        font-size="22" filter="url(#glow)">🚀</text>

  <!-- Label -->
  <text x="172" y="37"
        text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="17" font-weight="700" fill="white" letter-spacing="0.6"
        filter="url(#textGlow)">View Live Demo</text>

  <!-- Sub-label -->
  <text x="172" y="54"
        text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="10" font-weight="500" fill="rgba(255,255,255,0.75)" letter-spacing="1.2">
    optical-shop-pos.onrender.com
  </text>
</svg>
